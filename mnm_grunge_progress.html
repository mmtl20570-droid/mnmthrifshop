<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNM Thriftshop – Grunge Version</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root {
  --black: #000;
  --cream: #0a0a0a;
  --warm: #111;
  --rust: #ff2e2e;
  --text: #eaeaea;
}

* { margin:0; padding:0; box-sizing:border-box; cursor:crosshair; }

body {
  background:#000;
  color:#fff;
  font-family: 'Courier New', monospace;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:0.15;
  pointer-events:none;
}

/* MARQUEE */
.marquee-wrap {
  position:fixed;
  top:0;
  width:100%;
  background:#000;
  border-bottom:1px solid #ff2e2e;
  overflow:hidden;
  z-index:300;
}

.marquee-track {
  display:flex;
  animation:marquee 10s linear infinite;
}

.marquee-item {
  padding:0 2rem;
  color:#ff2e2e;
  font-family:'Bebas Neue';
}

@keyframes marquee {
  from { transform:translateX(0); }
  to { transform:translateX(-50%); }
}

/* NAV */
nav {
  position:fixed;
  top:40px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:1rem 2rem;
  background:#000;
  border-bottom:2px solid #ff2e2e;
  z-index:200;
}

.nav-logo {
  font-family:'Bebas Neue', sans-serif;
  font-size:2rem;
  color:#fff;
  text-decoration:none;
}

/* SIDE MENU */
.side-menu {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 1rem;
  z-index: 200;
}

.side-menu a {
  text-decoration: none;
  color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.15em;
  font-size: 1.1rem;
  transition: all 0.2s;
}

.side-menu a:hover {
  color: #ff2e2e;
  transform: translateX(-6px) skewX(-10deg);
}

/* RARE DROPS */
.rare-drops {
  padding: 160px 2rem 80px;
  border-bottom: 2px solid #ff2e2e;
}

.rare-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 5rem;
  letter-spacing: 0.2em;
  transform: rotate(-2deg);
  margin-bottom: 3rem;
  text-align: center;
}

.rare-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
}

.rare-item {
  height: 250px;
  border: 2px dashed #ff2e2e;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  transition: all 0.3s;
}

.rare-item:hover {
  background: #ff2e2e;
  color: #000;
  transform: scale(1.05);
}

/* COMING SOON */
.section {
  padding: 100px 2rem;
  text-align: center;
}

.section-title {
  font-family:'Bebas Neue', sans-serif;
  font-size:4rem;
}
</style>
</head>

<body>

<div class="marquee-wrap">
  <div class="marquee-track">
    <span class="marquee-item">MNM THRIFT</span>
    <span class="marquee-item">✦</span>
    <span class="marquee-item">ANARCHY</span>
    <span class="marquee-item">✦</span>
    <span class="marquee-item">GRUNGE</span>
  </div>
</div>

<nav>
  <a href="#" class="nav-logo">MNM.</a>
</nav>

<div class="side-menu">
  <a href="#">Shorts</a>
  <a href="#">Pants</a>
  <a href="#">T-shirts</a>
  <a href="#">Hats</a>
  <a href="#">Shirts</a>
  <a href="#">Jackets</a>
  <a href="#">Hoodies / Sweaters</a>
  <a href="#">Shoes</a>
</div>

<section class="rare-drops">
  <h1 class="rare-title">RARE DROPS</h1>
  <div class="rare-grid">
    <div class="rare-item">DROP 01</div>
    <div class="rare-item">DROP 02</div>
    <div class="rare-item">DROP 03</div>
  </div>
</section>

<section class="section">
  <h2 class="section-title">COMING SOON</h2>
</section>

</body>
</html>
